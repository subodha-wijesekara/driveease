spring:
  application:
    name: driveease-api

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/driveease_rentals?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
app:
  jwt:
    # IMPORTANT: Override this via env var JWT_SECRET in production
    secret: "YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025!"
    expiration-ms: 86400000  # 24 hours

# Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.driveease.rentals: DEBUG
    org.springframework.security: INFO
